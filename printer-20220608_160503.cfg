[include macro.cfg]

[delta_calibrate]
radius: 100
speed: 100
horizontal_move_z: 50

[bed_mesh]
mesh_radius: 100
round_probe_count: 5
horizontal_move_z: 5
speed: 150

[probe]
pin: ~PA2
speed: 10
lift_speed: 30
activate_gcode:
    SET_VELOCITY_LIMIT ACCEL=50
    G4 P300
deactivate_gcode:
    SET_VELOCITY_LIMIT ACCEL={printer.configfile.config.printer.max_accel}

[gcode_arcs]
resolution: 0.1

[output_pin led]
pin: PD14

[temperature_sensor raspberry_pi]
sensor_type: temperature_host

[temperature_sensor board]
sensor_type: temperature_mcu

[mcu]
serial: /dev/ttyAMA0
restart_method: command
baud: 500000

[input_shaper]
shaper_freq_x: 40
shaper_freq_y: 40
shaper_type: mzv

[printer]
kinematics: delta
max_velocity: 500
max_accel: 3000
max_accel_to_decel: 3000
square_corner_velocity: 5
max_z_velocity: 200
minimum_z_position: -100
print_radius: 120

[virtual_sdcard]
path: ~/gcode_files

[pause_resume]

[respond]

[display_status]

[save_variables]
filename: ~/variables.cfg

[endstop_phase stepper_a]
[endstop_phase stepper_b]
[endstop_phase stepper_c]

[stepper_a]
step_pin: PE9
dir_pin: PF1
enable_pin: !PF2
microsteps: 16
rotation_distance: 40
endstop_pin: !PB10
homing_speed: 100
second_homing_speed: 10

[tmc2208 stepper_a]
uart_pin: PC13
run_current: 0.900
stealthchop_threshold: 999999

[stepper_b]
step_pin: PE11
dir_pin: PE8
enable_pin: !PD7
microsteps: 16
rotation_distance: 40
endstop_pin: !PE12

[tmc2208 stepper_b]
uart_pin: PE3
run_current: 0.900
stealthchop_threshold: 999999

[stepper_c]
step_pin: PE13
enable_pin: !PC0
dir_pin: PC2
microsteps: 16
rotation_distance: 40
endstop_pin: !PG8

[tmc2209 stepper_c]
uart_pin: PE1
run_current: 0.900
stealthchop_threshold: 999999

[extruder]
step_pin: PE14
dir_pin: !PA0
enable_pin: !PC3
microsteps: 16
rotation_distance: 24.031
full_steps_per_rotation: 200
gear_ratio: 7:1
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PB1
sensor_pin: PF3
pressure_advance: 0.02
max_extrude_only_distance: 1000
max_extrude_cross_section: 2
sensor_type: ATC Semitec 104GT-2
min_temp: 0
max_temp: 350

[tmc2209 extruder]
uart_pin: PD4
run_current: 0.8
interpolate: True

[heater_bed]
heater_pin: PD12
sensor_pin: PF4
sensor_type: EPCOS 100K B57560G104F
min_temp: 0
max_temp: 130

[fan]
pin: PC8

[heater_fan fan1]
pin: PE5

[controller_fan fan2]
pin: PE6
idle_speed: 0.3
fan_speed: 0.7

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PG4, EXP1_3=PD11, EXP1_5=PG2, EXP1_7=PG6, EXP1_9=<GND>,
    EXP1_2=PA8, EXP1_4=PD10, EXP1_6=PG3, EXP1_8=PG7, EXP1_10=<5V>,
    # EXP2 header
    EXP2_1=PB14, EXP2_3=PG10, EXP2_5=PF11, EXP2_7=PF12,  EXP2_9=<GND>,
    EXP2_2=PB13, EXP2_4=PB12, EXP2_6=PB15, EXP2_8=<RST>, EXP2_10=PF13
    # Pins EXP2_1, EXP2_6, EXP2_2 are also MISO, MOSI, SCK of bus "spi2"

